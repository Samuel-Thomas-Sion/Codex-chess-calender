<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>ADMIN EVENT CONTROL</h1>
<p>Create and manage tactical events.</p>

<input type="date" id="eventDate"><br><br>

<input type="text" id="eventTitle" placeholder="Event Title"><br><br>

<select id="eventType">
<option>Blitz 3|0</option>
<option>Blitz 5|0</option>
<option>Rapid</option>
<option>Bullet</option>
<option>Daily</option>
<option>Community</option>
</select>

<br><br>

<select id="eventPriority">
<option value="low">Low</option>
<option value="normal">Normal</option>
<option value="high">High</option>
<option value="critical">Critical</option>
</select>

<br><br>

<textarea id="eventNotes" placeholder="Event Notes" rows="6"></textarea>

<br><br>

<button type="button" id="loginBtn">LOGIN WITH GOOGLE</button>
<button type="button" id="saveBtn" disabled>SAVE EVENT</button>

<hr>

<h2>EXISTING EVENTS</h2>
<div id="eventList"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBn_mhOSCqiseN5X65y7TaEgQeCNUCsyF8",
  authDomain: "codex-calender-27650.firebaseapp.com",
  projectId: "codex-calender-27650",
  storageBucket: "codex-calender-27650.firebasestorage.app",
  messagingSenderId: "584615922168",
  appId: "1:584615922168:web:84cdba0ab0dfd250062e0d",
  measurementId: "G-NE2MXJJBWY"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;

// AUTH STATE TRACKER (CRITICAL FIX)
auth.onAuthStateChanged(user => {
  currentUser = user;

  const saveBtn = document.getElementById("saveBtn");

  if (user) {
    saveBtn.disabled = false;
    console.log("Logged in:", user.email);
  } else {
    saveBtn.disabled = true;
    console.log("Not logged in");
  }
});

// LOGIN BUTTON
document.getElementById("loginBtn").addEventListener("click", () => {
  auth.signInWithPopup(provider)
    .then(result => {
      console.log("Login success:", result.user.email);
    })
    .catch(err => {
      console.error("Login failed:", err);
    });
});

</script>

<script src="admin.js"></script>

</body>
</html>
